name: Release Please

on:
  push:
    branches:
      - main

# Required permissions for release-please to create releases and PRs
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Use the latest v4 version which runs on Node.js 20+
      # The warning is about the runner's Node.js version, not the action itself
      # This action is compatible and will continue working after Node.js 20 removal
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # Optional: Checkout code if you need to run additional steps after release
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.releases_created == 'true' }}
